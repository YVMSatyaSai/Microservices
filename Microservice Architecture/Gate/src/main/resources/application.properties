spring.application.name=GATEWAY
server.port=80

#eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.service-url.defaultZone=http://eureka:8761/eureka

spring.cloud.gateway.routes[0].id=fire-service
#spring.cloud.gateway.routes[0].uri=http://localhost:8093
spring.cloud.gateway.routes[0].uri=lb://FIRE-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/fire/**

spring.cloud.gateway.routes[1].id=cool-service
#spring.cloud.gateway.routes[1].uri=http://localhost:8094
spring.cloud.gateway.routes[1].uri=lb://COOL-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/cool/**

spring.cloud.loadbalancer.ribbon.enabled=false
logging.level.org.springframework.cloud.gateway=DEBUG

management.tracing.sampling.probability=1.0
#management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
management.zipkin.tracing.endpoint=http://zipkin:9411/api/v2/spans