spring.application.name=COOL-SERVICE
server.port=8094

#eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.service-url.defaultZone=http://eureka:8761/eureka

#external.service.base-url=http://localhost:8093/fire
external.service.base-url=http://FIRE-SERVICE/fire

# Not Mandatory
resilience4j.circuitbreaker.instances.fireService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.fireService.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.fireService.permittedNumberOfCallsInHalfOpenState=2
resilience4j.circuitbreaker.instances.fireService.slidingWindowSize=5

# Feign timeout
spring.cloud.openfeign.client.config.default.connectTimeout=2000
spring.cloud.openfeign.client.config.default.readTimeout=2000
# Optional
spring.retry.maxAttempts=3
spring.retry.backoff.delay=1000

management.tracing.sampling.probability=1.0
#management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
management.zipkin.tracing.endpoint=http://zipkin:9411/api/v2/spans

#spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.bootstrap-servers=kafka:9092